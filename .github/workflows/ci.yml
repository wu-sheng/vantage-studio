name: CI

on:
  pull_request:
  push:
    branches: [main]
    # Tag pushes are owned by `.github/workflows/release.yml` (image
    # build with `:<version>` + `:latest`, cosign sign, SBOM, GH
    # release). CI deliberately doesn't fire on tags to avoid double
    # publishing.

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `version` deliberately omitted — pnpm/action-setup reads the
      # version from package.json's `packageManager` field. Specifying
      # both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # License-header check uses Apache's skywalking-eyes (the same
      # tool the SkyWalking project uses upstream). Config lives at
      # `.licenserc.yaml`. Run with `header check`; for autofix
      # locally use `header fix` against the same config.
      - uses: apache/skywalking-eyes/header@v0.7.0
        with:
          config: .licenserc.yaml

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

  # Build (and on push to main, push) a Docker image tagged with the
  # commit SHA. Tag-based release images are produced by release.yml.
  # PR runs build the image to catch Dockerfile regressions but skip
  # the push to GHCR.
  image:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image metadata
        id: meta
        run: |
          owner_repo="${{ github.repository }}"
          owner_repo_lc="${owner_repo,,}"
          short_sha="${GITHUB_SHA::7}"
          echo "image=ghcr.io/${owner_repo_lc}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Compose image tags
        id: tags
        run: |
          # Tagging policy: commit-id per main push, version tag per
          # release (release.yml). Anything else (full SHA, rolling
          # `:main`) is redundant — the operator workflow that wants
          # the rolling tip uses `git log` then `:sha-<short>`, and
          # the full-SHA + commit metadata is in OCI labels +
          # SLSA provenance attestation already.
          {
            echo 'tags<<EOF'
            printf '%s\n' "${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short_sha }}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build${{ github.event_name == 'push' && ' + push' || '' }} commit image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=vantage-studio
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign commit image (keyless)
        if: github.event_name == 'push'
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"
