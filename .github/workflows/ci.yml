name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `version` deliberately omitted — pnpm/action-setup reads the
      # version from package.json's `packageManager` field. Specifying
      # both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm license-headers

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test
