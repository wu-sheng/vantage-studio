name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write # GitHub Releases
  packages: write # GHCR
  id-token: write # cosign keyless

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.tag }}" | sed 's/^v//' >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.title=vantage-studio
            org.opencontainers.image.version=${{ steps.tag.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0
          provenance: true
          sbom: false # we generate our own with syft below for explicit CycloneDX format

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate CycloneDX SBOM
        run: |
          syft \
            "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}" \
            -o cyclonedx-json=vantage-studio-${{ steps.tag.outputs.version }}.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign attest --yes \
            --predicate vantage-studio-${{ steps.tag.outputs.version }}.cdx.json \
            --type cyclonedx \
            "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the full list of changes.

            **Image:** `ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}`
            **Digest:** `${{ steps.build.outputs.digest }}`

            The image is signed with cosign (keyless, OIDC-bound to this
            workflow run) and has a CycloneDX SBOM attestation. Verify with:

            ```
            cosign verify ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }} \
              --certificate-identity-regexp 'https://github.com/${{ github.repository }}/' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            ```
          files: vantage-studio-${{ steps.tag.outputs.version }}.cdx.json
          draft: false
          prerelease: false
