# Single-command demo stack: Studio + OAP + BanyanDB.
#
# Usage:
#   docker compose -f deploy/docker/docker-compose.yml up --build
#
# Then visit http://localhost:8080 — login admin / vantage-changeme.
# Replace the password by editing ./.studio-data/studio.yaml after the
# first run (or before, if you mount a hand-written one in).
#
# OAP image: SWIP-13 (admin-server + runtime-rule + dsl-debugging) and
# SWIP-14 (inspect) aren't in a tagged release yet. For the demo to
# reach every /runtime/* + /dsl-debugging/* + /inspect/* surface
# Studio uses, you need an OAP build of the consolidated branch — pull
# a CI image or build locally from ~/github/skywalking and tag it as
# `apache/skywalking-oap-server:admin-server` (matches install.md).

name: vantage-studio

services:
  banyandb:
    image: apache/skywalking-banyandb:latest
    command: ['standalone']
    ports:
      - '17912:17912'
    healthcheck:
      test: ['CMD', '/banyandb', 'health']
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [vs]

  oap:
    image: apache/skywalking-oap-server:admin-server
    depends_on:
      banyandb:
        condition: service_healthy
    environment:
      SW_STORAGE: banyandb
      SW_STORAGE_BANYANDB_TARGETS: 'banyandb:17912'
      # All four admin-bound selectors must be set — see install.md.
      # Without `admin-server`, the other three fail at boot with
      # `ModuleNotFoundException: admin-server`. Studio's preflight
      # surface (Cluster status · Required modules) shows which are
      # on at runtime.
      SW_ADMIN_SERVER: default
      SW_RECEIVER_RUNTIME_RULE: default
      SW_DSL_DEBUGGING: default
      SW_INSPECT: default
      # Bind the admin-server port to the cluster network only.
      # Studio reaches it as `oap:17128`; nothing on the host can.
      SW_CORE_REST_HOST: 0.0.0.0
    expose:
      - '12800' # status / GraphQL (MQE fires here)
      - '17128' # admin-server (BFF-only)
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:12800/status/cluster/nodes >/dev/null']
      interval: 5s
      timeout: 3s
      retries: 60
    networks: [vs]

  studio:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: vantage-studio:dev
    depends_on:
      oap:
        condition: service_healthy
    environment:
      STUDIO_CONFIG: /data/studio.yaml
      STUDIO_CONFIG_EXAMPLE: /app/studio.yaml.example
      STUDIO_UI_DIR: /app/ui
    ports:
      - '8080:8080'
    volumes:
      - studio-data:/data
    networks: [vs]

networks:
  vs:
    driver: bridge

volumes:
  studio-data:
