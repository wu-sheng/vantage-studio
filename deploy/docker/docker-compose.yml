# Single-command demo stack: Studio + OAP + BanyanDB.
#
# Usage:
#   docker compose -f deploy/docker/docker-compose.yml up --build
#
# Then visit http://localhost:8080 — login admin / vantage-changeme.
# Replace the password by editing ./.studio-data/studio.yaml after the
# first run (or before, if you mount a hand-written one in).
#
# OAP image: the runtime-rule receiver feature lives on
# feature/runtime-rule-hot-update upstream and isn't in a tagged
# release yet. For the demo to reach the relevant /runtime/rule/*
# endpoints you need an OAP build of that branch — pull a CI image or
# build locally from ~/github/skywalking and tag it as
# `apache/skywalking-oap-server:runtime-rule`.

name: vantage-studio

services:
  banyandb:
    image: apache/skywalking-banyandb:latest
    command: ['standalone']
    ports:
      - '17912:17912'
    healthcheck:
      test: ['CMD', '/banyandb', 'health']
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [vs]

  oap:
    image: apache/skywalking-oap-server:runtime-rule
    depends_on:
      banyandb:
        condition: service_healthy
    environment:
      SW_STORAGE: banyandb
      SW_STORAGE_BANYANDB_TARGETS: 'banyandb:17912'
      SW_RECEIVER_RUNTIME_RULE: default
      # Bind the runtime-rule admin port to the cluster network only.
      # Studio reaches it as `oap:17128`; nothing on the host can.
      SW_CORE_REST_HOST: 0.0.0.0
    expose:
      - '12800' # status / GraphQL
      - '17128' # runtime-rule admin (BFF-only)
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:12800/status/cluster/nodes >/dev/null']
      interval: 5s
      timeout: 3s
      retries: 60
    networks: [vs]

  studio:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: vantage-studio:dev
    depends_on:
      oap:
        condition: service_healthy
    environment:
      STUDIO_CONFIG: /data/studio.yaml
      STUDIO_CONFIG_EXAMPLE: /app/studio.yaml.example
      STUDIO_UI_DIR: /app/ui
    ports:
      - '8080:8080'
    volumes:
      - studio-data:/data
    networks: [vs]

networks:
  vs:
    driver: bridge

volumes:
  studio-data:
